<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeiroxYT - Official</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  background: #0a0a0a;
}

/* HEADER */
header {
  padding: 30px;
  background: linear-gradient(90deg, #ff0000, #1f1f1f);
  box-shadow: 0 0 20px red;
}

h1 {
  margin: 0;
  font-size: 2.8em;
}

#subs {
  font-size: 22px;
  margin-top: 10px;
}

/* BUTTONS */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px white;
}

.yt { background: red; color: white; }
.dc { background: #5865F2; color: white; }

/* SECTIONS */
.section {
  margin-top: 40px;
}

/* VIDEOS */
#videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  padding: 20px;
}

.video {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(255,0,0,0.2);
}

.video:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

.video a {
  color: #00f0ff;
  text-decoration: none;
  font-weight: bold;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>
  <h1>🎮 ZeiroxYT</h1>
  <div id="subs">🔴 Chargement...</div>

  <a class="btn yt" href="https://www.youtube.com/channel/UC7zZ0jj9KUx1Cy-zRBRNRZw" target="_blank">🔔 YouTube</a>
  <a class="btn dc" href="https://discord.gg/vdCJWFw8" target="_blank">💬 Discord</a>
</header>

<div class="section">
  <h2>🔥 À propos</h2>
  <p>Créateur Fortnite 🎮 | Gameplay, fun & clips 🔥</p>
</div>

<div class="section">
  <h2>🎬 Dernières vidéos</h2>
  <div id="videos"></div>
</div>

<footer>
  © 2026 ZeiroxYT - Official Website
</footer>

<script>
let target = 270;
let count = 0;

let interval = setInterval(() => {
  if (count < target) {
    count++;
    document.getElementById("subs").innerHTML = "🔴 " + count + " abonnés";
  } else {
    clearInterval(interval);
  }
}, 10);
</script>

<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UC7zZ0jj9KUx1Cy-zRBRNRZw")
.then(res => res.json())
.then(data => {
  let html = "";

  data.items.forEach(item => {
    html += `
      <div class="video">
        <a href="${item.link}" target="_blank">🎬 ${item.title}</a>
      </div>
    `;
  });

  document.getElementById("videos").innerHTML = html;
});
</script>

</body>
</html>
