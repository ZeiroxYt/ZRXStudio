<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeiroxYT GOD MODE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  background: linear-gradient(-45deg,#000,#111,#ff0000,#000);
  background-size: 400% 400%;
  animation: bg 12s infinite;
}

@keyframes bg {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

header {
  padding: 30px;
  background: rgba(0,0,0,0.7);
  box-shadow: 0 0 25px red;
}

h1 {
  font-size: 3em;
  color: #ff3b3b;
}

#typing {
  font-size: 20px;
  margin-top: 10px;
}

#subs {
  font-size: 22px;
  margin: 10px;
}

/* BOUTONS */
.btn {
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px white;
}

.yt{background:red;}
.dc{background:#5865F2;}

/* SECTION */
.section {
  margin-top:40px;
}

/* FEATURE VIDEO */
.featured iframe {
  border-radius:15px;
  box-shadow:0 0 20px red;
}

/* PROGRESS */
progress {
  width:250px;
  height:10px;
}

/* VIDEOS GRID */
#videos {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.video {
  background:rgba(0,0,0,0.7);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.video:hover {
  transform:scale(1.05);
  box-shadow:0 0 25px red;
}

.video img {
  width:100%;
}

.video a {
  display:block;
  padding:10px;
  color:#00f0ff;
  text-decoration:none;
  font-weight:bold;
}

footer {
  margin-top:40px;
  padding:20px;
  opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>🎮 ZRX_ZeiroxYT</h1>
<div id="typing"></div>
<div id="subs">🔴 Chargement...</div>

<a class="btn yt" href="https://www.youtube.com/channel/UC7zZ0jj9KUx1Cy-zRBRNRZw" target="_blank">🔔 YouTube</a>
<a class="btn dc" href="https://discord.gg/vdCJWFw8" target="_blank">💬 Discord</a>
</header>

<!-- FEATURE VIDEO -->
<div class="section featured">
<h2>🔥 Vidéo à la une</h2>
<iframe width="300" height="170"
src="https://www.youtube.com/embed/ID_VIDEO"
allowfullscreen></iframe>
</div>

<!-- OBJECTIF -->
<div class="section">
<h2>🎯 Objectif 500 abonnés</h2>
<progress value="270" max="500"></progress>
</div>

<!-- VIDEOS -->
<div class="section">
<h2>🎬 Dernières vidéos</h2>
<div id="videos"></div>
</div>

<footer>
© 2026 ZeiroxYT GOD MODE
</footer>

<script>
// TEXTE ANIMÉ
let txt="Bienvenue sur mon site officiel 🔥";
let i=0;
function type(){
 if(i<txt.length){
  document.getElementById("typing").innerHTML+=txt.charAt(i);
  i++;
  setTimeout(type,40);
 }
}
type();

// COMPTEUR
let count=0;
let target=289;

let inter=setInterval(()=>{
 if(count<target){
  count++;
  document.getElementById("subs").innerHTML="🔴 "+count+" abonnés";
 } else clearInterval(inter);
},10);

// VIDEOS
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=UC7zZ0jj9KUx1Cy-zRBRNRZw")
.then(res=>res.json())
.then(data=>{
 let html="";
 data.items.forEach(v=>{
  html+=`
  <div class="video">
    <img src="${v.thumbnail}">
    <a href="${v.link}" target="_blank">${v.title}</a>
  </div>`;
 });
 document.getElementById("videos").innerHTML=html;
});
</script>

</body>
</html>
