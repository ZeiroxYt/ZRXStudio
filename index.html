<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZeiroxYT - Vidéos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #111827;
      font-size: 24px;
      font-weight: bold;
    }

    #videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .video {
      background: #1f2937;
      padding: 15px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .video:hover {
      transform: scale(1.03);
    }

    .video a {
      color: #00f0ff;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  🎬 Mes dernières vidéos YouTube
</header>
<div style="margin:20px;">
  
  <a href="https://www.youtube.com/channel/UC7zZ0jj9KUx1Cy-zRBRNRZw" target="_blank"
     style="display:inline-block;margin:10px;padding:10px 20px;background:red;color:white;text-decoration:none;border-radius:8px;">
    🔔 YouTube
  </a>

  <a href="LIEN_DE_TON_DISCORD" target="_blank"
     style="display:inline-block;margin:10px;padding:10px 20px;background:#5865F2;color:white;text-decoration:none;border-radius:8px;">
    💬 Discord
  </a>

</div>
<div id="videos"></div>

<script>
fetch("https://www.youtube.com/feeds/videos.xml?channel_id=UC7zZ0jj9KUx1Cy-zRBRNRZw")
  .then(response => response.text())
  .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
  .then(data => {
    const entries = data.querySelectorAll("entry");
    let html = "";

    entries.forEach(entry => {
      const title = entry.querySelector("title").textContent;
      const link = entry.querySelector("link").getAttribute("href");

      html += `
        <div class="video">
          <a href="${link}" target="_blank">
            ${title}
          </a>
        </div>
      `;
    });

    document.getElementById("videos").innerHTML = html;
  });
</script>

</body>
</html>
